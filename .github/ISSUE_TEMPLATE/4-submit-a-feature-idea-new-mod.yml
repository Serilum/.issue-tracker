name: "Submit a feature idea for a new mod."
description: "Something that you'd think is a great addition to the game."
labels: ["Feature Request"]
assignees:
  - ricksouth
body:
  - type: input
    id: minecraft-version
    attributes:
      label: "Minecraft version:"
  - type: dropdown
    id: modloader
    attributes:
      label: "Modloader:"
      options:
        - Fabric
        - Forge
        - NeoForge

        - Other / All
    validations:
      required: true
  - type: textarea
    id: feature-description
    attributes:
      label: "Feature description:"
    validations:
      required: true
