name: "Submit a comment. What's on your mind?"
description: "This can be about anything. Hello! :)"
labels: ["Comment"]
assignees:
  - ricksouth
body:
  - type: markdown
    attributes:
      value: "Hi! This issue tracker page is for all of Serilum's mods combined. Please specify which mod you are having trouble with or a question about."
  - type: input
    id: mod-name
    attributes:
      label: Mod name
  - type: input
    id: mod-version
    attributes:
      label: Mod version
  - type: textarea
    id: comment
    attributes:
      label: Comment
    validations:
      required: true
